  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ign:right\">Estoque<\u002Fspan><span style=\"text-align:right\">Custo un.<\u002Fspan><span style=\"text-align:right\">Valor total<\u002Fspan><span style=\"text-align:right\">% cap.<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"max-height:440px;overflow-y:auto\">\n              <sc-for list=\"{{ finInventario }}\" as=\"p\" hint-placeholder-count=\"12\">\n                <div style=\"display:grid;grid-template-columns:minmax(150px,1fr) 90px 88px 100px 70px;padding:11px 18px;border-bottom:1px solid var(--row);align-items:center\" style-hover=\"background:var(--hover)\">\n                  <div style=\"min-width:0\"><div style=\"font-size:12.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ p.nome }}<\u002Fdiv><div style=\"font-size:10.5px;color:var(--text-faint)\">{{ p.cat }}<\u002Fdiv><\u002Fdiv>\n                  <span style=\"font-family:'JetBrains Mono';font-size:12.5px;color:{{ p.estColor }};text-align:right\">{{ p.estoque }}<\u002Fspan>\n                  <span style=\"font-family:'JetBrains Mono';font-size:12px;color:var(--text-mute);text-align:right\">{{ p.unitFmt }}<\u002Fspan>\n                  <span style=\"font-family:'JetBrains Mono';font-size:12.5px;color:var(--text);font-weight:600;text-align:right\">{{ p.totalFmt }}<\u002Fspan>\n                  <span style=\"font-family:'JetBrains Mono';font-size:11.5px;color:var(--text-faint);text-align:right\">{{ p.pct }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-top:1px solid var(--border2);background:var(--header)\">\n              <span style=\"font-size:13px;font-weight:600\">Capital total imobilizado<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono';font-size:16px;font-weight:700;color:#3ECF8E\">{{ finEstoqueFmt }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- movimentações financeiras -->\n          <div style=\"background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden\">\n            <div style=\"padding:16px 18px;border-bottom:1px solid var(--hover2);display:flex;align-items:center;gap:9px\"><h3 style=\"margin:0;font-size:14px;font-weight:600;flex:1\">Movimentações<\u002Fh3><span style=\"font-family:'JetBrains Mono';font-size:12px;color:var(--text-faint)\">hoje<\u002Fspan><\u002Fdiv>\n            <div style=\"max-height:495px;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px\">\n              <sc-for list=\"{{ finMovs }}\" as=\"m\" hint-placeholder-count=\"6\">\n                <div style=\"display:flex;align-items:center;gap:11px;padding:11px 12px;background:var(--hover);border:1px solid var(--border);border-radius:10px\">\n                  <span style=\"width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:{{ m.bg }};color:{{ m.color }}\"><svg viewBox=\"0 0 24 24\" width=\"15\" height=\"15\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"{{ m.arrow }}\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                  <div style=\"flex:1;min-width:0\"><div style=\"font-size:12.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ m.produto }}<\u002Fdiv><div style=\"font-family:'JetBrains Mono';font-size:10.5px;color:var(--text-faint)\">{{ m.tipoLabel }} · {{ m.qtd }} un · Hoje {{ m.when }}<\u002Fdiv><\u002Fdiv>\n                  <span style=\"font-family:'JetBrains Mono';font-size:13px;font-weight:600;color:{{ m.color }};white-space:nowrap\">{{ m.valorFmt }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== ORDENS DE SERVIÇO (orçamento) ===== -->\n      <sc-if value=\"{{ isOrdens }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:24px 28px 60px\">\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap\">\n          <div>\n            <h2 style=\"margin:0;font-size:22px;font-weight:600;letter-spacing:-.3px\">Ordens de Serviço · Orçamento de manutenção<\u002Fh2>\n            <p style=\"margin:5px 0 0;color:var(--text-mute);font-size:13.5px\">Monte o orçamento com peças do estoque. Ao gerar a OS, o estoque é baixado automaticamente.<\u002Fp>\n          <\u002Fdiv>\n          <button onclick=\"{{ clearOs }}\" style=\"display:flex;align-items:center;gap:7px;padding:9px 15px;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--text-dim);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit\" style-hover=\"background:var(--row)\"><svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2\"><\u002Fpath><\u002Fsvg>Limpar<\u002Fbutton>\n        <\u002Fdiv>\n\n        <!-- descrição -->\n        <div style=\"background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px\">\n          <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-faint);font-weight:600;margin-bottom:7px\">Descrição do serviço / problema<\u002Fdiv>\n          <input value=\"{{ osDesc }}\" oninput=\"{{ onOsDesc }}\" placeholder=\"Ex.: Revisão preventiva 400.000 km, barulho no freio dianteiro, troca de filtros...\" style=\"width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:9px;background:var(--input);color:var(--text);font-size:13.5px;font-family:inherit;outline:none\" style-focus=\"border-color:#3ECF8E\">\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:1fr 400px;gap:14px;align-items:start\">\n          <!-- left: catalog + labor -->\n          <div style=\"display:flex;flex-direction:column;gap:14px\">\n            <div style=\"background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px\">\n              <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:13px\">\n                <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-faint);font-weight:600;flex:1\">1 · Peças do estoque<\u002Fdiv>\n                <div style=\"position:relative\">\n                  <svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"none\" stroke=\"#6b6b6b\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"position:absolute;left:10px;top:50%;transform:translateY(-50%)\"><circle cx=\"11\" cy=\"11\" r=\"8\"><\u002Fcircle><path d=\"m21 21-4.3-4.3\"><\u002Fpath><\u002Fsvg>\n                  <input value=\"{{ osPartSearch }}\" oninput=\"{{ onOsPartSearch }}\" placeholder=\"Buscar peça...\" style=\"width:220px;padding:7px 10px 7px 30px;border:1px solid var(--border2);border-radius:7px;background:var(--input);color:var(--text);font-size:12.5px;font-family:inherit;outline:none\" style-focus=\"border-color:#3ECF8E\">\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px\">\n                <sc-for list=\"{{ osCatalogo }}\" as=\"p\" hint-placeholder-count=\"8\">\n                  <button onclick=\"{{ p.add }}\" style=\"text-align:left;border:1px solid var(--border2);border-radius:11px;padding:12px;background:var(--input);cursor:pointer;font-family:inherit;display:flex;flex-direction:column;gap:7px\" style-hover=\"border-color:var(--border3);background:var(--header)\">\n                    <div style=\"display:flex;align-items:center;justify-content:space-between\"><span style=\"font-family:'JetBrains Mono';font-size:10.5px;color:var(--text-faint)\">{{ p.cod }}<\u002Fspan><span style=\"font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;background:{{ p.estBg }};color:{{ p.estColor }}\">{{ p.estoque }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"font-size:12.5px;font-weight:600;color:var(--text);line-height:1.25\">{{ p.nome }}<\u002Fdiv>\n                    <div style=\"display:flex;align-items:center;justify-content:space-between\"><span style=\"font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.4px\">{{ p.cat }}<\u002Fspan><span style=\"font-family:'JetBrains Mono';font-size:12.5px;color:#3ECF8E;font-weight:600\">{{ p.unitFmt }}<\u002Fspan><\u002Fdiv>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- right: orçamento -->\n          <div style=\"background:var(--surface);border:1px solid var(--border2);border-radius:12px;overflow:hidden;position:sticky;top:14px\">\n            <div style=\"padding:15px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px\"><svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"#3ECF8E\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><path d=\"M14 2v6h6M8 13h8M8 17h5\"><\u002Fpath><\u002Fsvg><h3 style=\"margin:0;font-size:14px;font-weight:600;flex:1\">Orçamento<\u002Fh3><span style=\"font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;background:{{ osTruckBadge.bg }};color:{{ osTruckBadge.color }};font-family:'JetBrains Mono'\">{{ osTruckBadge.label }}<\u002Fspan><\u002Fdiv>\n            <div style=\"max-height:46vh;overflow-y:auto;padding:12px 14px\">\n              <sc-if value=\"{{ hasOsParts }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-faint);font-weight:600;margin-bottom:8px\">Peças<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:7px;margin-bottom:14px\">\n                  <sc-for list=\"{{ osPartsView }}\" as=\"p\" hint-placeholder-count=\"0\">\n                    <div style=\"display:flex;align-items:center;gap:9px;padding:9px;background:var(--card);border:1px solid var(--border);border-radius:9px\">\n                      <div style=\"flex:1;min-width:0\"><div style=\"font-size:12.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ p.nome }}<\u002Fdiv><div style=\"font-family:'JetBrains Mono';font-size:10.5px;color:{{ p.estColor }}\">{{ p.vUnitFmt }} un · {{ p.estInfo }}<\u002Fdiv><\u002Fdiv>\n                      <div style=\"display:flex;align-items:center;gap:4px;flex-shrink:0\">\n                        <button onclick=\"{{ p.dec }}\" style=\"width:24px;height:24px;border-radius:6px;border:1px solid var(--border2);background:var(--input);color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-family:inherit\" style-hover=\"border-color:#3ECF8E\">−<\u002Fbutton>\n                        <span style=\"font-family:'JetBrains Mono';font-size:13px;font-weight:700;width:24px;text-align:center\">{{ p.qtd }}<\u002Fspan>\n                        <button onclick=\"{{ p.inc }}\" style=\"width:24px;height:24px;border-radius:6px;border:1px solid var(--border2);background:var(--input);color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-family:inherit\" style-hover=\"border-color:#3ECF8E\">+<\u002Fbutton>\n                      <\u002Fdiv>\n                      <span style=\"font-family:'JetBrains Mono';font-size:12.5px;font-weight:600;color:var(--text);width:74px;text-align:right\">{{ p.totalFmt }}<\u002Fspan>\n                      <button onclick=\"{{ p.remove }}\" style=\"width:22px;height:22px;border:none;border-radius:6px;background:transparent;color:var(--text-faint);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0\" style-hover=\"color:#ff6b6b\">✕<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ osBuilderEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"text-align:center;padding:34px 16px;color:var(--text-faint);font-size:13px;border:1px dashed var(--border2);border-radius:11px\">Adicione peças do estoque<br>para montar o orçamento.<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"padding:14px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px\">\n              <div style=\"display:flex;justify-content:space-between;font-size:12.5px;color:var(--text-mute)\"><span>Peças<\u002Fspan><span style=\"font-family:'JetBrains Mono';color:var(--text-dim)\">{{ osTotalPecasFmt }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:4px;padding-top:10px;border-top:1px solid var(--border)\"><span style=\"font-size:13.5px;font-weight:600\">Total<\u002Fspan><span style=\"font-family:'JetBrains Mono';font-size:20px;font-weight:700;color:#3ECF8E\">{{ osTotalFmt }}<\u002Fspan><\u002Fdiv>\n              <button onclick=\"{{ gerarOS }}\" style=\"margin-top:8px;width:100%;padding:14px;border:none;border-radius:10px;background:#3ECF8E;color:#0c1410;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px\" style-hover=\"background:#46d997\"><svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><path d=\"M14 2v6h6\"><\u002Fpath><\u002Fsvg>Gerar Ordem de Serviço<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- ordens geradas -->\n        <div style=\"background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-top:18px\">\n          <div style=\"padding:15px 18px;border-bottom:1px solid var(--hover2);display:flex;align-items:center;gap:9px\"><h3 style=\"margin:0;font-size:14px;font-weight:600;flex:1\">Ordens de serviço geradas<\u002Fh3><span style=\"font-family:'JetBrains Mono';font-size:12px;color:var(--text-faint)\">{{ osListCount }} OS<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:90px 130px minmax(160px,1fr) 110px 110px 120px;padding:9px 18px;border-bottom:1px solid var(--hover2);background:var(--header);font-size:11px;font-weight:600;color:var(--text-mute);text-transform:uppercase;letter-spacing:.4px\">\n            <span>OS<\u002Fspan><span>Veículo<\u002Fspan><span>Serviço<\u002Fspan><span style=\"text-align:right\">Total<\u002Fspan><span style=\"text-align:center\">Status<\u002Fspan><span style=\"text-align:right\">Ação<\u002Fspan>\n          <\u002Fdiv>\n          <sc-for list=\"{{ osTableRows }}\" as=\"o\" hint-placeholder-count=\"2\">\n            <div style=\"display:grid;grid-template-columns:90px 130px minmax(160px,1fr) 110px 110px 120px;padding:12px 18px;border-bottom:1px solid var(--row);align-items:center\" style-hover=\"background:var(--hover)\">\n              <span style=\"font-family:'JetBrains Mono';font-size:13px;color:var(--text);font-weight:600\">#{{ o.num }}<\u002Fspan>\n              <div><div style=\"font-family:'JetBrains Mono';font-size:12px;color:var(--text-dim)\">{{ o.placa }}<\u002Fdiv><div style=\"font-size:10.5px;color:var(--text-faint)\">{{ o.data }}<\u002Fdiv><\u002Fdiv>\n              <span style=\"font-size:12.5px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:10px\">{{ o.desc }}<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono';font-size:13px;color:#3ECF8E;font-weight:600;text-align:right\">{{ o.totalFmt }}<\u002Fspan>\n              <div style=\"text-align:center\"><span style=\"font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px;background:{{ o.stBg }};color:{{ o.stColor }}\">{{ o.stLabel }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:flex-end;gap:6px\">\n                <button onclick=\"{{ o.print }}\" title=\"Imprimir OS\" style=\"display:flex;align-items:center;gap:6px;padding:6px 11px;border:1px solid #3ECF8E;border-radius:7px;background:rgba(62,207,142,.1);color:#3ECF8E;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit\" style-hover=\"background:rgba(62,207,142,.2)\"><svg viewBox=\"0 0 24 24\" width=\"13\" height=\"13\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z\"><\u002Fpath><\u002Fsvg>PDF<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== ALMOXARIFADO / ESTOQUE (dashboard) ===== -->\n      <sc-if value=\"{{ isAlmox }}\" hint-placeholder-val=\"{{ false }}\">\n      <div class=\"est-fade\" style=\"padding:24px 28px 56px;max-width:1480px\">\n        <!-- header -->\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px\">\n          <div>\n            <h2 style=\"margin:0;font-size:22px;font-weight:700;letter-spacing:-.3px\">Almoxarifado &amp; Estoque<\u002Fh2>\n            <p style=\"margin:5px 0 0;color:var(--text-mute);font-size:13.5px\">Controle de peças de caminhão — entrada
